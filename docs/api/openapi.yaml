    patch: { tags: [SuperAdmin], summary: Update admin role, requestBody: { required: true, content: { application/json: { schema: { type: object } } } }, responses: { '200': { description: OK } } }
    delete: { tags: [SuperAdmin], summary: Deactivate admin, responses: { '200': { description: OK } } }

  /api/super-admin/tickets/{id}/comments:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [SuperAdmin], summary: Add admin comment, requestBody: { required: true, content: { application/json: { schema: { type: object, required: [body], properties: { body: { type: string } } } } } }, responses: { '200': { description: OK } } }
  /api/super-admin/tickets/{id}/status:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [SuperAdmin], summary: Update ticket status (email notification), requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { status: { type: string }, reason: { type: string } } } } } }, responses: { '200': { description: OK } } }
  /api/super-admin/tickets/{id}/priority:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [SuperAdmin], summary: Update ticket priority, requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { priority: { type: string }, reason: { type: string } } } } } }, responses: { '200': { description: OK } } }

  /api/super-admin/feature-flags:
    get: { tags: [SuperAdmin], summary: List feature flags, responses: { '200': { description: OK } } }
    post: { tags: [SuperAdmin], summary: Create a feature flag, requestBody: { required: true, content: { application/json: { schema: { type: object } } } }, responses: { '201': { description: Created } } }
  /api/super-admin/feature-flags/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get: { tags: [SuperAdmin], summary: Get a feature flag, responses: { '200': { description: OK } } }
    patch: { tags: [SuperAdmin], summary: Update a feature flag, requestBody: { required: true, content: { application/json: { schema: { type: object } } } }, responses: { '200': { description: OK } } }
    delete: { tags: [SuperAdmin], summary: Delete a feature flag, responses: { '200': { description: OK } } }
  /api/super-admin/feature-flags/{id}/tenants:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get: { tags: [SuperAdmin], summary: Search tenants / list overrides, parameters: [ { name: q, in: query, schema: { type: string } }, { name: overrideOnly, in: query, schema: { type: boolean } } ], responses: { '200': { description: OK } } }
    post: { tags: [SuperAdmin], summary: Set a per-tenant override, requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { tenantId: { type: string }, enabled: { type: boolean }, reason: { type: string } } } } } }, responses: { '200': { description: OK } } }
  /api/super-admin/feature-flags/{id}/tenants/{tenantId}:
    parameters: [ { $ref: '#/components/parameters/IdPath' }, { name: tenantId, in: path, required: true, schema: { type: string } } ]
    delete: { tags: [SuperAdmin], summary: Remove a per-tenant override, responses: { '200': { description: OK } } }

  /api/super-admin/audit-log/export:
    get: { tags: [SuperAdmin], summary: Export audit log as CSV, parameters: [ { name: targetType, in: query, schema: { type: string } }, { name: actorEmail, in: query, schema: { type: string } }, { name: actionPrefix, in: query, schema: { type: string } }, { name: from, in: query, schema: { type: string, format: date } }, { name: to, in: query, schema: { type: string, format: date } } ], responses: { '200': { description: text/csv } } }
  /api/super-admin/error-logs/{id}/resolve:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [SuperAdmin], summary: Mark error log resolved, requestBody: { required: false, content: { application/json: { schema: { type: object, properties: { reason: { type: string } } } } } }, responses: { '200': { description: OK } } }
    delete: { tags: [SuperAdmin], summary: Mark error log unresolved, responses: { '200': { description: OK } } }

  /api/super-admin/pwa/force-update:
    post: { tags: [SuperAdmin], summary: 'Browser-only — rotate PWA nonce for all clients. Not for mobile.', responses: { '200': { description: OK } } }
  /api/super-admin/impersonate:
    post: { tags: [SuperAdmin], summary: Start impersonating a tenant user, requestBody: { required: true, content: { application/json: { schema: { type: object, required: [userId], properties: { userId: { type: string } } } } } }, responses: { '200': { description: OK } } }
  /api/super-admin/impersonate/stop:
    post: { tags: [SuperAdmin], summary: Stop impersonation, responses: { '200': { description: OK } } }
  /api/super-admin/me/sessions:
    post: { tags: [SuperAdmin], summary: Revoke all other sessions (bump sessionVersion), responses: { '200': { description: OK } } }
  /api/super-admin/me/password:
    post: { tags: [SuperAdmin], summary: Change own password, requestBody: { required: true, content: { application/json: { schema: { type: object, required: [currentPassword, newPassword], properties: { currentPassword: { type: string }, newPassword: { type: string } } } } } }, responses: { '200': { description: OK } } }

components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    DateRange:
      name: from
      in: query
      required: false
      schema: { type: string, format: date }
      description: shared `from`/`to` date-range query params

  responses:
    Unauthorized:
      description: No/invalid token (401, code UNAUTHENTICATED)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    ValidationError:
      description: Invalid input (400, code VALIDATION_ERROR) — see error.details[]
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    NotFound:
      description: Resource not found (404, code NOT_FOUND)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    Conflict:
      description: Conflict / duplicate (409, code CONFLICT)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    RateLimited:
      description: Too many requests (429, code RATE_LIMITED)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        A NextAuth session JWT obtained from `POST /api/auth/login`.
        Send as `Authorization: Bearer <token>`. Carries tenant/branch/permission
        context, so no tenant header is needed on authenticated calls.

  schemas:
    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - INVALID_INPUT
        - UNAUTHENTICATED
        - FORBIDDEN
        - INSUFFICIENT_PERMISSION
        - NOT_FOUND
        - CONFLICT
        - BUSINESS_RULE_VIOLATION
        - INVALID_STATUS_TRANSITION
        - INSUFFICIENT_BALANCE
        - OUTLET_LOCKED
        - SUBSCRIPTION_LIMIT_REACHED
        - RATE_LIMITED
        - DATABASE_ERROR
        - EXTERNAL_SERVICE_ERROR
        - INTERNAL_ERROR

    FieldError:
      type: object
      properties:
        field: { type: string, example: "items.0.quantity" }
        message: { type: string }

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          required: [code, message]
          properties:
            code: { $ref: '#/components/schemas/ErrorCode' }
            message: { type: string }
            details: { type: array, items: { $ref: '#/components/schemas/FieldError' } }

    DeletedResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object, properties: { deleted: { type: boolean, example: true } } }

    # ── Auth ──
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        scope: { type: string, enum: ["super-admin"], description: "omit for tenant users" }

    AuthUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        role: { type: string, example: OWNER }
        tenantId: { type: string, format: uuid, nullable: true }
        tenantName: { type: string }
        tenantSlug: { type: string, nullable: true }
        branchId: { type: string, nullable: true, description: '"ALL" when user sees all outlets' }
        branchName: { type: string }
        activeModule: { type: string, example: laundry }
        activeModules: { type: array, items: { type: string } }
        permissions: { type: array, items: { type: string }, example: ["orders:read", "orders:create"] }
        roleId: { type: string, nullable: true }
        roleName: { type: string, nullable: true }
        sessionVersion: { type: integer }
        featureFlags: { type: object, additionalProperties: { type: boolean } }

    LoginResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            token: { type: string, description: NextAuth session JWT — send as Bearer }
            expiresAt: { type: integer, description: Unix ms (~8h from issue) }
            user: { $ref: '#/components/schemas/AuthUser' }

    # ── Core domain models ──
    Customer:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        balance: { type: number, description: deposit balance (IDR) }
        status: { type: string }
        note: { type: string, nullable: true }
        clientId: { type: string, nullable: true, description: offline idempotency key }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CustomerInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
        balance: { type: number }
        note: { type: string }
        clientId: { type: string, description: offline idempotency key }

    CustomerResponse:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/Customer' }

    CustomerDepositTxn:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: number }
        method: { type: string }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    OrderItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        serviceId: { type: string, format: uuid }
        serviceName: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        subtotal: { type: number }

    OrderPayment:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: number }
        paymentMethod: { type: string }
        paidAt: { type: string, format: date-time }

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderNumber: { type: string }
        status: { type: string, example: RECEIVED }
        paymentStatus: { type: string, example: UNPAID }
        customerId: { type: string, format: uuid, nullable: true }
        customerName: { type: string, nullable: true }
        branchId: { type: string, format: uuid }
        totalAmount: { type: number, description: total in IDR }
        paidAmount: { type: number }
        discountAmount: { type: number }
        notes: { type: string, nullable: true }
        items: { type: array, items: { $ref: '#/components/schemas/OrderItem' } }
        payments: { type: array, items: { $ref: '#/components/schemas/OrderPayment' } }
        receivedAt: { type: string, format: date-time, nullable: true }
        deliveredAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OrderInput:
      type: object
      required: [items]
      properties:
        customerId: { type: string, format: uuid, nullable: true }
        branchId: { type: string, format: uuid }
        items:
          type: array
          items:
            type: object
            required: [serviceId, quantity]
            properties:
              serviceId: { type: string, format: uuid }
              quantity: { type: number }
        discountAmount: { type: number }
        paymentMethod: { type: string }
        notes: { type: string }
        clientId: { type: string, description: offline idempotency key }

    OrderResponse:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/Order' }

    OrderPhoto:
      type: object
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [before, after, damage] }
        bytes: { type: integer }
        width: { type: integer }
        height: { type: integer }
        mime: { type: string }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    Service:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        groupId: { type: string, format: uuid, nullable: true }
        basePrice: { type: number }
        unit: { type: string, example: kg }
        isActive: { type: boolean }
        sortOrder: { type: integer }

    ServiceInput:
      type: object
      required: [name, basePrice]
      properties:
        name: { type: string }
        groupId: { type: string, format: uuid }
        basePrice: { type: number }
        unit: { type: string }
        isActive: { type: boolean }

    ServiceGroup:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        sortOrder: { type: integer }

    Branch:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        address: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        isActive: { type: boolean }

    PickupRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, example: PENDING }
        customerName: { type: string }
        customerPhone: { type: string }
        customerAddress: { type: string, nullable: true }
        requestedDate: { type: string, format: date, nullable: true }
        requestedSlot: { type: string, nullable: true }
        assignedDriverId: { type: string, format: uuid, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    PickupInput:
      type: object
      required: [customerName, customerPhone]
      properties:
        customerName: { type: string }
        customerPhone: { type: string }
        customerAddress: { type: string }
        requestedDate: { type: string, format: date }
        requestedSlot: { type: string }
        notes: { type: string }

    Ticket:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject: { type: string }
        description: { type: string }
        category: { type: string, nullable: true }
        status: { type: string }
        priority: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        roleId: { type: string, format: uuid, nullable: true }
        roleName: { type: string, nullable: true }
        branchId: { type: string, nullable: true }
        isActive: { type: boolean }

    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        permissions: { type: array, items: { type: string } }
        isSystem: { type: boolean }

    StockItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        unit: { type: string }
        quantity: { type: number }
        lowStockThreshold: { type: number }
        unitCost: { type: number }

    StockItemInput:
      type: object
      required: [name, unit]
      properties:
        name: { type: string }
        unit: { type: string }
        quantity: { type: number }
        lowStockThreshold: { type: number }
        unitCost: { type: number }

    Expense:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: number }
        categoryId: { type: string, format: uuid }
        note: { type: string, nullable: true }
        date: { type: string, format: date }

    DashboardStats:
      type: object
      description: Aggregated KPIs — shape is summary-style; inspect live response for exact fields.
      properties:
        revenue: { type: object }
        orders: { type: object }
        customers: { type: object }
        cashFlow: { type: object }
        comparison: { type: object }

    DashboardHeatmap:
      type: object
      properties:
        hourlyByDayOfWeek: { type: array, items: { type: object } }
        revenueByDay: { type: array, items: { type: object } }
        visits: { type: array, items: { type: object } }

    KanbanOrder:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderNumber: { type: string }
        status: { type: string }
        customerName: { type: string, nullable: true }
        serviceName: { type: string, nullable: true }
        receivedAt: { type: string, format: date-time, nullable: true }

    BillingStatus:
      type: object
      properties:
        planTier: { type: string }
        trialEndsAt: { type: string, format: date-time, nullable: true }
        coveredBranchIds: { type: array, items: { type: string } }
        isActive: { type: boolean }

    PublicBranch:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        address: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        hours: { type: string, nullable: true }

    PublicTrackOrder:
      type: object
      properties:
        orderNumber: { type: string }
        status: { type: string }
        customerName: { type: string, nullable: true }
        serviceName: { type: string, nullable: true }
        receivedAt: { type: string, format: date-time, nullable: true }
        estimatedDoneAt: { type: string, format: date-time, nullable: true }

    HealthStatus:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            status: { type: string, example: ok }
            database: { type: string, example: ok }
            timestamp: { type: string, format: date-time }
