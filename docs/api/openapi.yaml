openapi: 3.0.3

info:
  title: hivePOS API
  version: 1.0.0
  description: |
    REST API for hivePOS — browser-native POS for Indonesian UMKM laundry.
    All routes return a uniform JSON envelope and accept `Authorization: Bearer <token>`
    (a NextAuth session JWT). **Native/mobile clients (Flutter) authenticate via
    `POST /api/auth/login` and send the returned token as a Bearer header.**

    ### Mobile notes (Flutter)
    - **Tenant routing**: authenticated calls need NO subdomain or `?tenant=` —
      `tenantId`/`branchId` come from the token. Only the *public* endpoints
      (`/api/public/*`, `/api/track/*`) need `?tenant=<slug>` or the
      `x-tenant-slug` header.
    - **Envelope**: `{ success: true, data, meta? }` / `{ success: false, error: { code, message, details? } }`.
    - **Types**: money is a JSON `number` (Decimal→Number), dates are ISO-8601
      strings, ids are UUID strings.
    - **Deletes** return `200 { data: { deleted: true } }` (no `204`).
    - **Browser-only** (not for mobile): `/api/printers/*`, `/api/print`,
      `/api/pwa/nonce`, `/api/super-admin/pwa/force-update`,
      `/api/user/profile/oauth-link/start`.

    See `FLUTTER_INTEGRATION.md` for a full client guide with Dart examples.

servers:
  - url: https://hivepos.id
    description: Production (platform host). Authenticated calls use the token; no subdomain needed.
  - url: http://localhost:3007
    description: Local dev (npm run dev).

tags:
  - name: Auth
    description: "Authentication, login & session"
  - name: Public
    description: "Unauthenticated public endpoints (tenant website / tracking / pickup / support)"
  - name: Track
    description: "Public order tracking by order number"
  - name: Billing
    description: "Tenant subscription billing (Midtrans)"
  - name: Customers
    description: "Customer CRUD, deposits & stats"
  - name: Orders
    description: "Orders, payments, status & proof photos"
  - name: Pickup
    description: "Pickup requests lifecycle"
  - name: Dashboard
    description: "Dashboard stats, heatmap & kanban"
  - name: Services
    description: "Services & service groups"
  - name: Inventory
    description: "Stock items, movements & expenses"
  - name: Branches
    description: "Branch/outlet management"
  - name: Reports
    description: "Reports & exports"
  - name: Tickets
    description: "Tenant support tickets"
  - name: Users
    description: "Users & RBAC roles"
  - name: TenantConfig
    description: "Tenant website & WhatsApp templates"
  - name: Profile
    description: "Current user profile"
  - name: Printers
    description: "Browser-only LAN printing (not for mobile)"
  - name: System
    description: "Health, telemetry, PWA nonce, photo cleanup"
  - name: SuperAdmin
    description: "Super-admin platform management"

security:
  - bearerAuth: []

paths:
  # ───────────────────────── Auth ─────────────────────────
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Mobile/programmatic login → returns a Bearer token
      description: |
        Authenticates with email + password and returns the NextAuth session JWT
        in the body (plus the resolved user). Store the token and send it as
        `Authorization: Bearer <token>` on every other request. The token is
        byte-compatible with the web session cookie. Rate-limited to 10/min/IP.
        Pass `scope:"super-admin"` to authenticate platform staff.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            examples:
              tenant:
                value: { email: "owner@berkahlaundry.id", password: "secret" }
              super_admin:
                value: { email: "admin@hivepos.id", password: "secret", scope: "super-admin" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Account pending approval / suspended (code FORBIDDEN) }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/auth/session-version:
    get:
      tags: [Auth]
      summary: Current sessionVersion (for revocation polling)
      description: Poll periodically; if it differs from the token's claim, re-login.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { type: object, properties: { sessionVersion: { type: integer } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/{...nextauth}:
    get:
      tags: [Auth]
      summary: NextAuth handler (GET) — browser flow
      security: []
      parameters:
        - { name: ...nextauth, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: NextAuth response } }
    post:
      tags: [Auth]
      summary: NextAuth handler (POST) — browser credentials/OAuth flow
      security: []
      parameters:
        - { name: ...nextauth, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: NextAuth response } }

  /api/register:
    post:
      tags: [Auth]
      summary: Register a new tenant + owner + branch + trial subscription
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantName, slug, ownerName, email, password]
              properties:
                tenantName: { type: string }
                slug: { type: string, description: tenant subdomain slug }
                ownerName: { type: string }
                email: { type: string, format: email }
                password: { type: string }
                trialTier: { type: string, enum: [GROWTH, PRO] }
      responses:
        '201': { description: Tenant created (auto-approved trial) }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }

  # ───────────────────────── Public ─────────────────────────
  /api/public/branches:
    get:
      tags: [Public]
      summary: List active branches (public tenant website)
      security: []
      parameters:
        - { name: tenant, in: query, schema: { type: string }, description: tenant slug (or use x-tenant-slug header) }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/PublicBranch' } }

  /api/public/services:
    get:
      tags: [Public]
      summary: List active services with groups
      security: []
      parameters:
        - { name: tenant, in: query, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Service' } }

  /api/public/orders/track:
    get:
      tags: [Public]
      summary: Find orders by phone number (public)
      security: []
      parameters:
        - { name: phone, in: query, required: true, schema: { type: string } }
        - { name: tenant, in: query, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Order' } }

  /api/public/pickup-requests:
    post:
      tags: [Public]
      summary: Submit a public pickup request
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerName, customerPhone]
              properties:
                branchSlug: { type: string }
                customerName: { type: string }
                customerPhone: { type: string }
                customerAddress: { type: string }
                requestedDate: { type: string, format: date }
                requestedSlot: { type: string }
                notes: { type: string }
      responses:
        '201': { description: Pickup request created }
        '400': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/public/tickets:
    post:
      tags: [Public]
      summary: Submit a public support ticket
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, description]
              properties:
                subject: { type: string }
                description: { type: string }
                category: { type: string }
                submitterName: { type: string }
                submitterEmail: { type: string, format: email }
                tenantSlug: { type: string }
      responses:
        '201': { description: Ticket created }
        '400': { $ref: '#/components/responses/ValidationError' }

  # ───────────────────────── Track ─────────────────────────
  /api/track/{orderNumber}:
    get:
      tags: [Track]
      summary: Track an order by order number (public)
      security: []
      parameters:
        - { name: orderNumber, in: path, required: true, schema: { type: string } }
        - { name: tenant, in: query, schema: { type: string }, description: tenant slug (required when not on subdomain) }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/PublicTrackOrder' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/track/{orderNumber}/photos:
    get:
      tags: [Track]
      summary: List proof photos for a tracked order (public)
      security: []
      parameters:
        - { name: orderNumber, in: path, required: true, schema: { type: string } }
        - { name: tenant, in: query, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/OrderPhoto' } }

  /api/track/{orderNumber}/photos/{photoId}:
    get:
      tags: [Track]
      summary: Stream a proof photo binary (public)
      security: []
      parameters:
        - { name: orderNumber, in: path, required: true, schema: { type: string } }
        - { name: photoId, in: path, required: true, schema: { type: string } }
        - { name: tenant, in: query, schema: { type: string } }
      responses:
        '200': { description: image/webp binary }

  # ───────────────────────── Billing ─────────────────────────
  /api/billing/status:
    get:
      tags: [Billing]
      summary: Tenant billing status (plan, trial, coverage)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/BillingStatus' }

  /api/billing/checkout:
    post:
      tags: [Billing]
      summary: Create a Midtrans checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branchIds, months, planTier]
              properties:
                branchIds: { type: array, items: { type: string } }
                months: { type: integer }
                planTier: { type: string }
                promoCode: { type: string }
      responses:
        '200': { description: snap token / redirect url }
        '400': { $ref: '#/components/responses/ValidationError' }

  /api/billing/promo/validate:
    post:
      tags: [Billing]
      summary: Validate a promo code for checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, branchIds, months]
              properties:
                code: { type: string }
                branchIds: { type: array, items: { type: string } }
                months: { type: integer }
      responses:
        '200': { description: discount details }

  /api/billing/webhook:
    post:
      tags: [Billing]
      summary: Midtrans payment webhook (signature-verified)
      security: []
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses: { '200': { description: OK } }

  # ───────────────────────── Customers ─────────────────────────
  /api/customers:
    get:
      tags: [Customers]
      summary: List / search customers
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: OK (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Customer' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Customers]
      summary: Create a customer (supports X-Client-Id idempotency for offline sync)
      parameters:
        - { name: X-Client-Id, in: header, schema: { type: string }, description: offline idempotency key }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }

  /api/customers/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdPath' }
    get:
      tags: [Customers]
      summary: Get a customer
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/CustomerResponse' } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Customers]
      summary: Update a customer
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CustomerInput' } } } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/CustomerResponse' } } }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Customers]
      summary: Delete a customer
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DeletedResponse' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/customers/{id}/deposit:
    parameters:
      - { $ref: '#/components/parameters/IdPath' }
    get:
      tags: [Customers]
      summary: List deposit transactions
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { success: { type: boolean }, data: { type: array, items: { $ref: '#/components/schemas/CustomerDepositTxn' } } } } } } } }
    post:
      tags: [Customers]
      summary: Record a deposit top-up
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [amount], properties: { amount: { type: number }, method: { type: string }, note: { type: string } } } } } }
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }

  /api/customers/{id}/stats:
    parameters:
      - { $ref: '#/components/parameters/IdPath' }
    get:
      tags: [Customers]
      summary: Customer statistics
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses: { '200': { description: OK } }

  # ───────────────────────── Orders ─────────────────────────
  /api/orders:
    get:
      tags: [Orders]
      summary: List / filter orders (paginated)
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
        - { name: paymentStatus, in: query, schema: { type: string } }
        - { name: dateFrom, in: query, schema: { type: string, format: date } }
        - { name: dateTo, in: query, schema: { type: string, format: date } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer } }
        - { name: sortBy, in: query, schema: { type: string } }
        - { name: sortOrder, in: query, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: OK (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Order' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Orders]
      summary: Create an order (supports X-Client-Id idempotency for offline sync)
      parameters:
        - { name: X-Client-Id, in: header, schema: { type: string }, description: offline idempotency key }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderInput' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } }
        '400': { $ref: '#/components/responses/ValidationError' }

  /api/orders/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdPath' }
    get:
      tags: [Orders]
      summary: Get order details
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Orders]
      summary: Update order notes / partial fields
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { notes: { type: string } } } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } } }
    put:
      tags: [Orders]
      summary: Replace / full update an order
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OrderInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } } }
    delete:
      tags: [Orders]
      summary: Delete an order
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DeletedResponse' } } } } }

  /api/orders/{id}/payments:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [Orders]
      summary: Record a payment on an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, paymentMethod]
              properties:
                amount: { type: number }
                paymentMethod: { type: string, description: "e.g. CASH, QRIS, EWALLET, DEPOSIT" }
                paidAt: { type: string, format: date-time }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } } }

  /api/orders/{id}/status:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    patch:
      tags: [Orders]
      summary: Advance order status (workflow)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [status], properties: { status: { type: string } } } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } }
        '400': { description: Invalid status transition (code INVALID_STATUS_TRANSITION) }

  /api/orders/{id}/photos:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [Orders]
      summary: List proof photos
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { success: { type: boolean }, data: { type: array, items: { $ref: '#/components/schemas/OrderPhoto' } } } } } } } }
    post:
      tags: [Orders]
      summary: Upload a proof photo (multipart)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [kind, file]
              properties:
                kind: { type: string, enum: [before, after, damage] }
                file: { type: string, format: binary }
      responses: { '201': { description: Created, content: { application/json: { schema: { type: object, properties: { success: { type: boolean }, data: { $ref: '#/components/schemas/OrderPhoto' } } } } } } }

  /api/orders/{id}/photos/{photoId}:
    parameters:
      - { $ref: '#/components/parameters/IdPath' }
      - { name: photoId, in: path, required: true, schema: { type: string } }
    get:
      tags: [Orders]
      summary: Stream a photo binary
      responses: { '200': { description: image/webp binary } }
    delete:
      tags: [Orders]
      summary: Delete a photo
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DeletedResponse' } } } } }

  # ───────────────────────── Pickup ─────────────────────────
  /api/pickup-requests:
    get:
      tags: [Pickup]
      summary: List pickup requests (paginated)
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { success: { type: boolean }, data: { type: array, items: { $ref: '#/components/schemas/PickupRequest' } }, meta: { $ref: '#/components/schemas/PaginationMeta' } } } } } } }
    post:
      tags: [Pickup]
      summary: Create a staff-initiated pickup request
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PickupInput' } } } }
      responses: { '201': { description: Created } }

  /api/pickup-requests/count-pending:
    get:
      tags: [Pickup]
      summary: Count pending pickup requests
      responses: { '200': { description: OK } }

  /api/pickup-requests/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [Pickup]
      summary: Get pickup request details
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  /api/pickup-requests/{id}/accept:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [Pickup], summary: Accept a pending pickup (PENDING→ACCEPTED), responses: { '200': { description: OK } } }
  /api/pickup-requests/{id}/reject:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [Pickup], summary: Reject a pickup, requestBody: { required: false, content: { application/json: { schema: { type: object, properties: { reason: { type: string } } } } } }, responses: { '200': { description: OK } } }
  /api/pickup-requests/{id}/assign:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [Pickup], summary: Assign/clear driver, requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { assignedDriverId: { type: string, nullable: true } } } } } }, responses: { '200': { description: OK } } }
  /api/pickup-requests/{id}/schedule:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [Pickup], summary: Schedule a pickup (ACCEPTED→SCHEDULED), requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { requestedDate: { type: string, format: date }, requestedSlot: { type: string }, assignedDriverId: { type: string } } } } } }, responses: { '200': { description: OK } } }
  /api/pickup-requests/{id}/convert:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post: { tags: [Pickup], summary: Convert a scheduled pickup to an order, responses: { '200': { description: OK } } }

  # ───────────────────────── Dashboard ─────────────────────────
  /api/dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Dashboard KPIs (revenue, orders, customers, cash flow, comparison)
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { success: { type: boolean }, data: { $ref: '#/components/schemas/DashboardStats' } } } } } } }

  /api/dashboard/heatmap:
    get:
      tags: [Dashboard]
      summary: Order heatmap (hourly by day-of-week, revenue, visits)
      parameters:
